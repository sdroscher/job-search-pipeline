root = "."
tmp_dir = "tmp"

[build]
  cmd = "task generate && go build -o ./tmp/main ./cmd/server"
  bin = "./tmp/main"
  include_ext = ["go", "templ", "sql"]
  exclude_dir = ["tmp", "bin", "data", "output", "static", ".superpowers", ".wolf", ".claude", ".idea"]
  exclude_regex = ["_templ\\.go$", "queries\\.sql\\.go$", "internal/db/db\\.go", "internal/db/models\\.go"]
  delay = 500
  stop_on_error = false
  log = "tmp/build-errors.log"

[log]
  time = true
  main_only = true

[color]
  main = "magenta"
  watcher = "cyan"
  build = "yellow"
  runner = "green"

[misc]
  clean_on_exit = true
