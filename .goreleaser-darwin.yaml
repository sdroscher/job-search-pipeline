version: 2

project_name: job-search-pipeline

before:
  hooks:
    - go install github.com/a-h/templ/cmd/templ@latest
    - go install github.com/sqlc-dev/sqlc/cmd/sqlc@latest
    - sqlc generate
    - templ generate

builds:
  - id: darwin
    main: ./cmd/server
    binary: job-search-pipeline
    goos: [darwin]
    goarch: [amd64, arm64]
    env:
      - CGO_ENABLED=1
    ldflags:
      - -s -w

archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    files:
      - README.md
      - LICENSE
      - docker-compose.yml
      - static/**
      - .claude/commands/job-search.md

checksum:
  disable: true

release:
  replace_existing_artifacts: true
  draft: false
  prerelease: auto
