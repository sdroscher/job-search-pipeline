version: '3'

dotenv: ['.env']

tasks:
  dev:
    deps: [dev:templ]
    cmd: go run ./cmd/server
    env:
      PORT: '{{.PORT | default "8080"}}'

  dev:templ:
    cmd: templ generate --watch
    background: true

  build:
    cmds:
      - templ generate
      - go build -o bin/job-search-pipeline ./cmd/server

  generate:
    cmds:
      - sqlc generate
      - templ generate

  test:
    deps: [generate]
    cmd: go test ./... -count=1 -race

  test:unit:
    deps: [generate]
    cmd: go test ./internal/... -count=1 -race

  test:feature:
    deps: [generate]
    cmd: go test ./tests/... -count=1 -race

  coverage:
    deps: [generate]
    cmds:
      - go test ./... -count=1 -coverprofile=coverage.out
      - grep -v "_templ\.go\|internal/db/db\.go\|internal/db/models\.go\|internal/db/queries\.sql\.go" coverage.out > coverage.filtered.out
      - go tool cover -func=coverage.filtered.out | tail -1

  lint:
    cmd: golangci-lint run ./...

  db:migrate:
    cmd: go run ./cmd/migrate
