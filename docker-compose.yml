services:
  app:
    image: ghcr.io/sdroscher/job-search-pipeline:latest
    ports:
      - "${PORT:-8080}:8080"
    volumes:
      - ./data:/data
      - ./output:/output
    environment:
      DATABASE_URL: /data/pipeline.db
      OUTPUT_DIR: /output
      PORT: "8080"
    restart: unless-stopped

# To build the image locally instead of pulling from GHCR:
#   docker compose build && docker compose up
# (requires Go 1.25+ toolchain in the builder stage)
